name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"

env:
  AWS_REGION: us-east-1
  ECR_REPO: cancer-app-backend
  APPRUNNER_SERVICE: cancer-app-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_URI=$REGISTRY/$ECR_REPO:latest
          docker build -t $IMAGE_URI ./backend
          docker push $IMAGE_URI

      - name: Trigger App Runner deployment
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          SERVICE_ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='$APPRUNNER_SERVICE'].ServiceArn" \
            --output text)
          aws apprunner start-deployment --service-arn $SERVICE_ARN
          echo "Deployment triggered for $SERVICE_ARN"
